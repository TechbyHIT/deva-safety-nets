# =============================================================================
# Nginx — HTTP + HTTPS (Docker app on 127.0.0.1:3000)
# =============================================================================

upstream deva_app {
    server 127.0.0.1:3000;
    keepalive 32;
}

# Rate limit HTML only — never throttle /images/ or /_next/static/ (caused 503s)
limit_req_zone $binary_remote_addr zone=pages:10m rate=300r/m;

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name devasafetynets.com www.devasafetynets.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }

    location / {
        return 301 https://devasafetynets.com$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.devasafetynets.com;

    ssl_certificate     /etc/letsencrypt/live/devasafetynets.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/devasafetynets.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://devasafetynets.com$request_uri;
}

server {
    listen 443 ssl http2 default_server;
    listen [::]:443 ssl http2 default_server;
    server_name devasafetynets.com;

    ssl_certificate     /etc/letsencrypt/live/devasafetynets.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/devasafetynets.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    client_max_body_size 4m;

    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_connect_timeout 15s;
    proxy_read_timeout 120s;
    proxy_send_timeout 120s;
    proxy_next_upstream error timeout http_502 http_503;
    proxy_next_upstream_tries 2;

    # Static assets — no rate limit
    location /_next/static/ {
        proxy_pass http://deva_app;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    location /images/ {
        proxy_pass http://deva_app;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    location /logo.png {
        proxy_pass http://deva_app;
        access_log off;
    }

    location /api/ {
        proxy_pass http://deva_app;
    }

    # HTML pages — light rate limit only here
    location / {
        limit_req zone=pages burst=100 nodelay;
        proxy_pass http://deva_app;
    }
}
