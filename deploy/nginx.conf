# =============================================================================
# Nginx reverse proxy — multi-site VPS (one upstream per site on 3000, 3001…)
# =============================================================================
# Install: sudo cp deploy/nginx.conf /etc/nginx/sites-available/deva-safety-nets
#          sudo ln -sf /etc/nginx/sites-available/deva-safety-nets /etc/nginx/sites-enabled/
#          sudo nginx -t && sudo systemctl reload nginx
#
# App runs via Docker on 127.0.0.1:3000 (not exposed publicly).
# Production uses unoptimized static images — no /_next/image optimizer cache.
# HTML is force-dynamic for combo routes; nginx micro-cache shields Node from bots.
# =============================================================================

upstream deva_app {
    server 127.0.0.1:3000;
    keepalive 32;
}

# Bounded edge micro-cache (memory only, not disk ISR).
proxy_cache_path /var/cache/nginx/deva
    levels=1:2
    keys_zone=deva_cache:10m
    max_size=256m
    inactive=2h
    use_temp_path=off;

# Rate limits
limit_req_zone $binary_remote_addr zone=search_api:10m rate=30r/m;
limit_req_zone $binary_remote_addr zone=general:10m rate=120r/m;
limit_conn_zone $binary_remote_addr zone=conn:10m;

# Cloudflare real IP — refresh from https://www.cloudflare.com/ips/
set_real_ip_from 173.245.48.0/20;
set_real_ip_from 103.21.244.0/22;
set_real_ip_from 103.22.200.0/22;
set_real_ip_from 103.31.4.0/22;
set_real_ip_from 141.101.64.0/18;
set_real_ip_from 108.162.192.0/18;
set_real_ip_from 190.93.240.0/20;
set_real_ip_from 188.114.96.0/20;
set_real_ip_from 197.234.240.0/22;
set_real_ip_from 198.41.128.0/17;
set_real_ip_from 162.158.0.0/15;
set_real_ip_from 104.16.0.0/13;
set_real_ip_from 104.24.0.0/14;
set_real_ip_from 172.64.0.0/13;
set_real_ip_from 131.0.72.0/22;
set_real_ip_from 2400:cb00::/32;
set_real_ip_from 2606:4700::/32;
set_real_ip_from 2803:f800::/32;
set_real_ip_from 2405:b500::/32;
set_real_ip_from 2405:8100::/32;
set_real_ip_from 2a06:98c0::/29;
set_real_ip_from 2c0f:f248::/32;
real_ip_header CF-Connecting-IP;

gzip on;
gzip_comp_level 5;
gzip_min_length 256;
gzip_proxied any;
gzip_vary on;
gzip_types
    application/javascript application/json application/xml
    application/rss+xml application/atom+xml image/svg+xml
    text/css text/plain text/xml font/woff2;

# brotli — enable if ngx_brotli module is installed:
# brotli on;
# brotli_comp_level 5;
# brotli_types text/css application/javascript application/json image/svg+xml;

map $sent_http_content_type $expires {
    default                    off;
    text/html                  epoch;
    application/javascript     max;
    text/css                   max;
    ~image/                    max;
    font/woff2                 max;
}

server {
    listen 80;
    listen [::]:80;
    server_name devasafetynets.com www.devasafetynets.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name devasafetynets.com www.devasafetynets.com;

    ssl_certificate     /etc/ssl/deva/origin.pem;
    ssl_certificate_key /etc/ssl/deva/origin.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    client_max_body_size 4m;
    client_body_timeout 15s;
    client_header_timeout 15s;
    send_timeout 30s;
    keepalive_timeout 65s;

    limit_conn conn 40;
    limit_req zone=general burst=40 nodelay;

    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_buffering on;
    proxy_buffer_size 16k;
    proxy_buffers 8 32k;
    proxy_busy_buffers_size 64k;
    proxy_read_timeout 60s;
    proxy_connect_timeout 10s;
    proxy_send_timeout 60s;

    # Immutable build assets
    location /_next/static/ {
        proxy_pass http://deva_app;
        proxy_cache deva_cache;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
        expires $expires;
        access_log off;
    }

    # Static images from /public — serve with long cache
    location /images/ {
        proxy_pass http://deva_app;
        proxy_cache deva_cache;
        proxy_cache_valid 200 30d;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # API — never micro-cache; rate-limit search
    location /api/search {
        limit_req zone=search_api burst=5 nodelay;
        proxy_pass http://deva_app;
        proxy_cache off;
        add_header Cache-Control "private, no-store";
    }

    location /api/ {
        proxy_pass http://deva_app;
        proxy_cache off;
        add_header Cache-Control "no-store";
    }

    # Sitemap / robots — short cache
    location ~ ^/(sitemap\.xml|robots\.txt) {
        proxy_pass http://deva_app;
        proxy_cache deva_cache;
        proxy_cache_valid 200 1h;
    }

    # HTML pages — short micro-cache to absorb crawler spikes
    location / {
        proxy_pass http://deva_app;
        proxy_cache deva_cache;
        proxy_cache_valid 200 302 2m;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        proxy_cache_background_update on;
        proxy_cache_lock on;
        add_header X-Cache-Status $upstream_cache_status;
    }
}
