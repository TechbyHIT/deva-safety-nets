# =============================================================================
# Nginx — HTTP + HTTPS for devasafetynets.com (Docker app on 127.0.0.1:3000)
# =============================================================================
# SSL setup (run once on VPS):
#   chmod +x deploy/ssl-certbot.sh
#   sudo ./deploy/ssl-certbot.sh
# Or manually:
#   sudo apt install -y certbot python3-certbot-nginx
#   sudo certbot --nginx -d devasafetynets.com -d www.devasafetynets.com
# =============================================================================

upstream deva_app {
    server 127.0.0.1:3000;
    keepalive 32;
}

limit_req_zone $binary_remote_addr zone=general:10m rate=120r/m;
limit_conn_zone $binary_remote_addr zone=conn:10m;

# HTTP — ACME challenge + redirect to HTTPS
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name devasafetynets.com www.devasafetynets.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }

    location / {
        return 301 https://devasafetynets.com$request_uri;
    }
}

# HTTPS — www → apex
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.devasafetynets.com;

    ssl_certificate     /etc/letsencrypt/live/devasafetynets.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/devasafetynets.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://devasafetynets.com$request_uri;
}

# HTTPS — main site
server {
    listen 443 ssl http2 default_server;
    listen [::]:443 ssl http2 default_server;
    server_name devasafetynets.com;

    ssl_certificate     /etc/letsencrypt/live/devasafetynets.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/devasafetynets.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    client_max_body_size 4m;
    limit_conn conn 40;
    limit_req zone=general burst=40 nodelay;

    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 60s;

    location /_next/static/ {
        proxy_pass http://deva_app;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    location /images/ {
        proxy_pass http://deva_app;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    location /api/ {
        proxy_pass http://deva_app;
    }

    location / {
        proxy_pass http://deva_app;
    }
}
