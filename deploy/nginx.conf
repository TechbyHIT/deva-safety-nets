# =============================================================================
# Nginx reverse proxy for the Next.js app (Deva Safety Nets)
# =============================================================================
# Place at /etc/nginx/sites-available/deva-safety-nets and symlink into
# sites-enabled, then: `sudo nginx -t && sudo systemctl reload nginx`.
#
# Assumes the app runs via PM2 (ecosystem.config.cjs) on 127.0.0.1:3000 and that
# Cloudflare sits in front (Full/Strict TLS). Replace DOMAIN + cert paths below.
# TLS certs: use Cloudflare Origin CA or certbot (`sudo certbot --nginx`).
# =============================================================================

# App upstream. To scale across CPU cores, run multiple PM2 instances on
# different ports and add them here; they share the on-disk ISR cache.
upstream deva_app {
    server 127.0.0.1:3000;
    keepalive 32;
}

# Micro-cache for full HTML responses. Next sets s-maxage / stale-while-revalidate
# on programmatic pages; this shields the Node process from crawler/traffic spikes
# across 20k+ pages. Cloudflare remains the primary edge cache.
proxy_cache_path /var/cache/nginx/deva levels=1:2 keys_zone=deva_cache:20m
                 max_size=2g inactive=24h use_temp_path=off;

# --- Restore the real visitor IP from Cloudflare -----------------------------
# Refresh ranges from https://www.cloudflare.com/ips/ periodically.
set_real_ip_from 173.245.48.0/20;
set_real_ip_from 103.21.244.0/22;
set_real_ip_from 103.22.200.0/22;
set_real_ip_from 103.31.4.0/22;
set_real_ip_from 141.101.64.0/18;
set_real_ip_from 108.162.192.0/18;
set_real_ip_from 190.93.240.0/20;
set_real_ip_from 188.114.96.0/20;
set_real_ip_from 197.234.240.0/22;
set_real_ip_from 198.41.128.0/17;
set_real_ip_from 162.158.0.0/15;
set_real_ip_from 104.16.0.0/13;
set_real_ip_from 104.24.0.0/14;
set_real_ip_from 172.64.0.0/13;
set_real_ip_from 131.0.72.0/22;
set_real_ip_from 2400:cb00::/32;
set_real_ip_from 2606:4700::/32;
set_real_ip_from 2803:f800::/32;
set_real_ip_from 2405:b500::/32;
set_real_ip_from 2405:8100::/32;
set_real_ip_from 2a06:98c0::/29;
set_real_ip_from 2c0f:f248::/32;
real_ip_header CF-Connecting-IP;

# gzip (Cloudflare also compresses at the edge; enable brotli here if the module
# is installed).
gzip on;
gzip_comp_level 5;
gzip_min_length 256;
gzip_proxied any;
gzip_vary on;
gzip_types
    application/javascript application/json application/xml
    application/rss+xml application/atom+xml image/svg+xml
    text/css text/plain text/xml font/woff2;

# --- HTTP -> HTTPS ------------------------------------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name devasafetynets.in www.devasafetynets.in;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name devasafetynets.in www.devasafetynets.in;

    # TLS (Cloudflare Origin CA or Let's Encrypt).
    ssl_certificate     /etc/ssl/deva/origin.pem;
    ssl_certificate_key /etc/ssl/deva/origin.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # Uploaded forms / quote requests.
    client_max_body_size 8m;

    # Security headers come from next.config.ts; do not duplicate here.

    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 60s;

    # Immutable build assets — cache hard at Nginx and let the browser keep them.
    location /_next/static/ {
        proxy_pass http://deva_app;
        proxy_cache deva_cache;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # Optimized images (next/image).
    location /_next/image {
        proxy_pass http://deva_app;
        proxy_cache deva_cache;
        proxy_cache_valid 200 30d;
        proxy_cache_key "$scheme$host$request_uri";
    }

    # Static files under /public.
    location /images/ {
        proxy_pass http://deva_app;
        proxy_cache deva_cache;
        proxy_cache_valid 200 30d;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # Everything else (pages, sitemap index + shards, robots, API).
    location / {
        proxy_pass http://deva_app;
        proxy_cache deva_cache;
        # Honor Next's Cache-Control (s-maxage / stale-while-revalidate).
        proxy_cache_valid 200 302 1m;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        proxy_cache_background_update on;
        proxy_cache_lock on;
        add_header X-Cache-Status $upstream_cache_status;
    }
}
