# =============================================================================
# Nginx reverse proxy — Deva Safety Nets (Docker app on 127.0.0.1:3000)
# =============================================================================
# Install:
#   sudo mkdir -p /var/cache/nginx
#   sudo cp deploy/nginx.conf /etc/nginx/sites-available/deva-safety-nets
#   sudo ln -sf /etc/nginx/sites-available/deva-safety-nets /etc/nginx/sites-enabled/
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx
# =============================================================================

upstream deva_app {
    server 127.0.0.1:3000;
    keepalive 32;
}

limit_req_zone $binary_remote_addr zone=general:10m rate=120r/m;
limit_conn_zone $binary_remote_addr zone=conn:10m;

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name devasafetynets.com www.devasafetynets.com;

    client_max_body_size 4m;
    limit_conn conn 40;
    limit_req zone=general burst=40 nodelay;

    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 60s;

    location /_next/static/ {
        proxy_pass http://deva_app;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    location /images/ {
        proxy_pass http://deva_app;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    location /api/ {
        proxy_pass http://deva_app;
    }

    location / {
        proxy_pass http://deva_app;
    }
}

# HTTPS — enable after placing origin certs at /etc/ssl/deva/
