# =============================================================================
# Nginx reverse proxy — multi-site VPS (one upstream per site on 3000, 3001…)
# =============================================================================
# Install: sudo cp deploy/nginx.conf /etc/nginx/sites-available/deva-safety-nets
#          sudo ln -sf /etc/nginx/sites-available/deva-safety-nets /etc/nginx/sites-enabled/
#          sudo nginx -t && sudo systemctl reload nginx
#
# App runs via Docker on 127.0.0.1:3000 (not exposed publicly).
# Production uses unoptimized static images — no /_next/image optimizer cache.
# HTML is force-dynamic for combo routes; nginx micro-cache shields Node from bots.
# =============================================================================

upstream deva_app {
    server 127.0.0.1:3000;
    keepalive 32;
}

# Bounded edge micro-cache (memory only, not disk ISR).
proxy_cache_path /var/cache/nginx/deva
    levels=1:2
    keys_zone=deva_cache:10m
    max_size=256m
    inactive=2h
    use_temp_path=off;

# Rate limits
limit_req_zone $binary_remote_addr zone=search_api:10m rate=30r/m;
limit_req_zone $binary_remote_addr zone=general:10m rate=120r/m;
limit_conn_zone $binary_remote_addr zone=conn:10m;

# Cloudflare real IP — refresh from https://www.cloudflare.com/ips/
set_real_ip_from 173.245.48.0/20;
set_real_ip_from 103.21.244.0/22;
set_real_ip_from 103.22.200.0/22;
set_real_ip_from 103.31.4.0/22;
set_real_ip_from 141.101.64.0/18;
set_real_ip_from 108.162.192.0/18;
set_real_ip_from 190.93.240.0/20;
set_real_ip_from 188.114.96.0/20;
set_real_ip_from 197.234.240.0/22;
set_real_ip_from 198.41.128.0/17;
set_real_ip_from 162.158.0.0/15;
set_real_ip_from 104.16.0.0/13;
set_real_ip_from 104.24.0.0/14;
set_real_ip_from 172.64.0.0/13;
set_real_ip_from 131.0.72.0/22;
set_real_ip_from 2400:cb00::/32;
set_real_ip_from 2606:4700::/32;
set_real_ip_from 2803:f800::/32;
set_real_ip_from 2405:b500::/32;
set_real_ip_from 2405:8100::/32;
set_real_ip_from 2a06:98c0::/29;
set_real_ip_from 2c0f:f248::/32;
real_ip_header CF-Connecting-IP;

# gzip is configured in /etc/nginx/nginx.conf — do not duplicate here.

map $sent_http_content_type $expires {
    default                    off;
    text/html                  epoch;
    application/javascript     max;
    text/css                   max;
    ~image/                    max;
    font/woff2                 max;
}

server {
    listen 80;
    listen [::]:80;
    server_name devasafetynets.com www.devasafetynets.com;

    client_max_body_size 4m;
    limit_conn conn 40;
    limit_req zone=general burst=40 nodelay;

    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 60s;

    location /_next/static/ {
        proxy_pass http://deva_app;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    location /images/ {
        proxy_pass http://deva_app;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    location /api/ {
        proxy_pass http://deva_app;
        proxy_cache off;
    }

    location / {
        proxy_pass http://deva_app;
    }
}

