name: Deploy to Hostinger

# GitHub-only deploy: build image on GitHub → push to GHCR → Hostinger pulls & runs.
# Setup: deploy/github.md

on:
  push:
    branches: [main, master]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  check-config:
    name: Check Hostinger config
    runs-on: ubuntu-latest
    outputs:
      vm_id: ${{ steps.vm.outputs.id }}
    steps:
      - name: Verify HOSTINGER_VM_ID
        id: vm
        env:
          VM_ID_VAR: ${{ vars.HOSTINGER_VM_ID }}
          VM_ID_SECRET: ${{ secrets.HOSTINGER_VM_ID }}
        run: |
          VM_ID="$VM_ID_VAR"
          if [ -z "$VM_ID" ]; then
            VM_ID="$VM_ID_SECRET"
          fi
          if [ -z "$VM_ID" ]; then
            echo "::error::HOSTINGER_VM_ID is not set."
            echo "::error::Add it as a Variable OR Secret named exactly HOSTINGER_VM_ID"
            echo "::error::Settings → Secrets and variables → Actions"
            exit 1
          fi
          if echo "$VM_ID" | grep -qE '[^0-9]'; then
            echo "::error::HOSTINGER_VM_ID must be NUMBERS ONLY."
            echo "::error::Wrong: https://hpanel.hostinger.com/vps/847291/overview"
            echo "::error::Right: 847291"
            echo "::error::Delete any duplicate HOSTINGER_VM_ID in Secrets if you use Variables."
            exit 1
          fi
          echo "id=$VM_ID" >> "$GITHUB_OUTPUT"
          echo "HOSTINGER_VM_ID is set (numeric)"

      - name: Verify required secrets exist
        run: |
          if [ -z "${{ secrets.HOSTINGER_API_KEY }}" ]; then
            echo "::error::HOSTINGER_API_KEY secret is not set. Go to Settings → Secrets and variables → Actions → Secrets"
            exit 1
          fi
          if [ -z "${{ secrets.REVALIDATE_SECRET }}" ]; then
            echo "::error::REVALIDATE_SECRET secret is not set"
            exit 1
          fi
          echo "Required secrets are set"

  build:
    name: Build Docker image
    runs-on: ubuntu-latest
    needs: check-config
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.image.outputs.name }}:latest

    steps:
      - uses: actions/checkout@v4

      - name: Set image name (GHCR requires lowercase)
        id: image
        run: |
          REPO_LC=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "name=${{ env.REGISTRY }}/${REPO_LC}" >> "$GITHUB_OUTPUT"
          echo "Image will be: ${{ env.REGISTRY }}/${REPO_LC}:latest"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.image.outputs.name }}:latest
            ${{ steps.image.outputs.name }}:${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_SITE_URL=${{ vars.NEXT_PUBLIC_SITE_URL || 'https://devasafetynets.in' }}
            NEXT_PUBLIC_SITE_NAME=${{ vars.NEXT_PUBLIC_SITE_NAME || 'Deva Safety Nets' }}
            NEXT_PUBLIC_BRAND_PHONE=${{ vars.NEXT_PUBLIC_BRAND_PHONE || '+917558844405' }}
            NEXT_PUBLIC_WHATSAPP=${{ vars.NEXT_PUBLIC_WHATSAPP || '917558844405' }}
            NEXT_PUBLIC_EMAIL=${{ vars.NEXT_PUBLIC_EMAIL || 'devasafetynetskochi@gmail.com' }}
            NEXT_PUBLIC_GOOGLE_MAPS_KEY=${{ vars.NEXT_PUBLIC_GOOGLE_MAPS_KEY || '' }}

  deploy:
    name: Deploy to Hostinger VPS
    needs: [check-config, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy target
        run: |
          echo "Image: ${{ needs.build.outputs.image }}"
          echo "VM ID: ${{ needs.check-config.outputs.vm_id }}"
          echo "After deploy: make GHCR package PUBLIC (Packages → settings) if pull fails"

      - name: Deploy via Hostinger API
        uses: hostinger/deploy-on-vps@v2
        with:
          api-key: ${{ secrets.HOSTINGER_API_KEY }}
          virtual-machine: ${{ needs.check-config.outputs.vm_id }}
          project-name: deva-safety-nets
          docker-compose-path: docker-compose.github.yml
          environment-variables: |
            DOCKER_IMAGE=${{ needs.build.outputs.image }}
            APP_PORT=${{ vars.APP_PORT || '3000' }}
            REVALIDATE_SECRET=${{ secrets.REVALIDATE_SECRET }}
            SITEMAP_PAGE_SIZE=${{ vars.SITEMAP_PAGE_SIZE || '45000' }}
