name: Deploy to Hostinger

# GitHub-only deploy: build image on GitHub → push to GHCR → Hostinger pulls & runs.
# Setup: deploy/github.md

on:
  push:
    branches: [main, master]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  check-config:
    name: Check Hostinger config
    runs-on: ubuntu-latest
    outputs:
      vm_id: ${{ steps.vm.outputs.id }}
    steps:
      - name: Verify HOSTINGER_VM_ID
        id: vm
        env:
          VM_ID_VAR: ${{ vars.HOSTINGER_VM_ID }}
          VM_ID_SECRET: ${{ secrets.HOSTINGER_VM_ID }}
        run: |
          if [ -n "$VM_ID_SECRET" ]; then
            echo "::warning::HOSTINGER_VM_ID exists in Secrets — delete it. Use Variables only."
          fi
          VM_ID="$VM_ID_VAR"
          VM_ID="${VM_ID#"${VM_ID%%[![:space:]]*}"}"
          VM_ID="${VM_ID%"${VM_ID##*[![:space:]]}"}"
          if echo "$VM_ID" | grep -qE 'hpanel\.hostinger\.com/vps/[0-9]+'; then
            VM_ID=$(echo "$VM_ID" | sed -n 's|.*/vps/\([0-9]*\).*|\1|p')
            echo "::warning::Extracted VM ID from URL — store only $VM_ID in Variables next time."
          fi
          if [ -z "$VM_ID" ]; then
            echo "::error::HOSTINGER_VM_ID variable is empty."
            echo "::error::Settings → Secrets and variables → Actions → Variables tab"
            echo "::error::Name: HOSTINGER_VM_ID  Value: 1813883 (your number only)"
            exit 1
          fi
          if echo "$VM_ID" | grep -qE '[^0-9]'; then
            echo "::error::HOSTINGER_VM_ID must be NUMBERS ONLY."
            echo "::error::Current value looks like a URL — use only the number from the URL."
            echo "::error::Wrong: https://hpanel.hostinger.com/vps/1813883/overview"
            echo "::error::Right: 1813883"
            exit 1
          fi
          echo "id=$VM_ID" >> "$GITHUB_OUTPUT"
          echo "HOSTINGER_VM_ID OK (${#VM_ID} digits)"

      - name: Verify required secrets exist
        run: |
          if [ -z "${{ secrets.HOSTINGER_API_KEY }}" ]; then
            echo "::error::HOSTINGER_API_KEY secret is not set. Go to Settings → Secrets and variables → Actions → Secrets"
            exit 1
          fi
          if [ -z "${{ secrets.REVALIDATE_SECRET }}" ]; then
            echo "::error::REVALIDATE_SECRET secret is not set"
            exit 1
          fi
          echo "Required secrets are set"

  build:
    name: Build Docker image
    runs-on: ubuntu-latest
    needs: check-config
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.image.outputs.name }}:latest

    steps:
      - uses: actions/checkout@v4

      - name: Set image name (GHCR requires lowercase)
        id: image
        run: |
          REPO_LC=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "name=${{ env.REGISTRY }}/${REPO_LC}" >> "$GITHUB_OUTPUT"
          echo "Image will be: ${{ env.REGISTRY }}/${REPO_LC}:latest"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.image.outputs.name }}:latest
            ${{ steps.image.outputs.name }}:${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_SITE_URL=${{ vars.NEXT_PUBLIC_SITE_URL || 'https://devasafetynets.in' }}
            NEXT_PUBLIC_SITE_NAME=${{ vars.NEXT_PUBLIC_SITE_NAME || 'Deva Safety Nets' }}
            NEXT_PUBLIC_BRAND_PHONE=${{ vars.NEXT_PUBLIC_BRAND_PHONE || '+917558844405' }}
            NEXT_PUBLIC_WHATSAPP=${{ vars.NEXT_PUBLIC_WHATSAPP || '917558844405' }}
            NEXT_PUBLIC_EMAIL=${{ vars.NEXT_PUBLIC_EMAIL || 'devasafetynetskochi@gmail.com' }}
            NEXT_PUBLIC_GOOGLE_MAPS_KEY=${{ vars.NEXT_PUBLIC_GOOGLE_MAPS_KEY || '' }}

  deploy:
    name: Deploy to Hostinger VPS
    needs: [check-config, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy target
        id: vm
        env:
          VM_ID_OUTPUT: ${{ needs.check-config.outputs.vm_id }}
          VM_ID_VAR: ${{ vars.HOSTINGER_VM_ID }}
        run: |
          VM_ID="$VM_ID_OUTPUT"
          if [ -z "$VM_ID" ]; then
            VM_ID="$VM_ID_VAR"
          fi
          VM_ID="${VM_ID#"${VM_ID%%[![:space:]]*}"}"
          VM_ID="${VM_ID%"${VM_ID##*[![:space:]]}"}"
          if echo "$VM_ID" | grep -qE 'hpanel\.hostinger\.com/vps/[0-9]+'; then
            VM_ID=$(echo "$VM_ID" | sed -n 's|.*/vps/\([0-9]*\).*|\1|p')
          fi
          if [ -z "$VM_ID" ] || echo "$VM_ID" | grep -qE '[^0-9]'; then
            echo "::error::Deploy VM ID must be numbers only (e.g. 1813883)."
            exit 1
          fi
          echo "id=$VM_ID" >> "$GITHUB_OUTPUT"
          echo "Image: ${{ needs.build.outputs.image }}"
          echo "VM ID: $VM_ID"
          echo "After deploy: make GHCR package PUBLIC (Packages → settings) if pull fails"

      - name: Prepare deploy environment
        id: env
        env:
          DOCKER_IMAGE: ${{ needs.build.outputs.image }}
          APP_PORT: ${{ vars.APP_PORT }}
          REVALIDATE_SECRET: ${{ secrets.REVALIDATE_SECRET }}
        run: |
          # Hostinger requires strict KEY=value lines (no blanks, no multiline values).
          PORT="${APP_PORT:-3000}"
          SECRET="${REVALIDATE_SECRET//$'\n'/}"
          SECRET="${SECRET//$'\r'/}"
          if [ -z "$DOCKER_IMAGE" ]; then
            echo "::error::DOCKER_IMAGE is empty — build job may have failed."
            exit 1
          fi
          if [ -z "$SECRET" ]; then
            echo "::error::REVALIDATE_SECRET is empty."
            exit 1
          fi
          {
            printf 'DOCKER_IMAGE=%s\n' "$DOCKER_IMAGE"
            printf 'APP_PORT=%s\n' "$PORT"
            printf 'REVALIDATE_SECRET=%s\n' "$SECRET"
          } > deploy.env
          echo "Deploy environment:"
          sed 's/REVALIDATE_SECRET=.*/REVALIDATE_SECRET=***hidden***/' deploy.env
          echo "env<<EOF" >> "$GITHUB_OUTPUT"
          cat deploy.env >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Deploy via Hostinger API
        uses: hostinger/deploy-on-vps@v2
        with:
          api-key: ${{ secrets.HOSTINGER_API_KEY }}
          virtual-machine: ${{ steps.vm.outputs.id }}
          project-name: deva-safety-nets
          docker-compose-path: docker-compose.github.yml
          environment-variables: ${{ steps.env.outputs.env }}
