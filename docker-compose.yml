# Hostinger Docker Manager: deploy this file from the repo root (not via File Manager
# upload alone). "0 containers" means the image build failed or the container exited —
# see deploy/hostinger.md for SSH log commands.
services:
  web:
    container_name: deva-safety-nets
    image: deva-safety-nets:latest
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-https://devasafetynets.in}
        NEXT_PUBLIC_SITE_NAME: ${NEXT_PUBLIC_SITE_NAME:-Deva Safety Nets}
        NEXT_PUBLIC_BRAND_PHONE: ${NEXT_PUBLIC_BRAND_PHONE:-+917558844405}
        NEXT_PUBLIC_WHATSAPP: ${NEXT_PUBLIC_WHATSAPP:-917558844405}
        NEXT_PUBLIC_EMAIL: ${NEXT_PUBLIC_EMAIL:-devasafetynetskochi@gmail.com}
        NEXT_PUBLIC_GOOGLE_MAPS_KEY: ${NEXT_PUBLIC_GOOGLE_MAPS_KEY:-}
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      REVALIDATE_SECRET: ${REVALIDATE_SECRET:-change-me}
      SITEMAP_PAGE_SIZE: ${SITEMAP_PAGE_SIZE:-45000}
      NODE_ENV: production
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"require('http').get('http://127.0.0.1:3000/api/health',(r)=>{process.exit(r.statusCode===200?0:1)}).on('error',()=>process.exit(1))\"",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
